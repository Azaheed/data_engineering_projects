version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant
    ports:
    - "6333:6333"
    environment:
    - MONGO_URI=mongodb://mongo:27017
    - QDRANT_URL=http://qdrant:6333

  ingestion:
    build: .
    container_name: ingestion_job
    depends_on:
      - mongo
    volumes:
      - ./data:/app/data
    environment:
      - MONGO_URI=mongodb://mongo:27017
  
  embedding:
    build: ./embedding
    depends_on:
      - mongo
      - qdrant
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - QDRANT_URL=http://qdrant:6333  

volumes:
  mongo_data: